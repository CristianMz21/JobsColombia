name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-wheel:
    name: Build wheel and sdist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install build dependencies
        run: uv pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  verify-wheel:
    name: Verify wheel contents
    runs-on: ubuntu-latest
    needs: build-wheel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install package
        run: uv pip install -e .

      - name: Verify wheel can be installed
        run: |
          pip install dist/*.whl --force-reinstall --no-deps
          python -c "import jobscolombia; print('Version:', jobscolombia.__version__)"

      - name: Check wheel contents
        run: |
          unzip -l dist/*.whl | head -30
          echo "---"
          tar -tzf dist/*.tar.gz | head -30

  test-install:
    name: Test pip install from source
    runs-on: ubuntu-latest
    needs: build-wheel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install from wheel
        run: pip install dist/*.whl

      - name: Verify installation
        run: |
          python -c "import jobscolombia; print(jobscolombia.__version__)"
          python -c "from jobscolombia import calcular_score; print(calcular_score('test', 'python'))"

  test-install-testpypi:
    name: Test installation from TestPyPI
    runs-on: ubuntu-latest
    needs: build-wheel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install twine
        run: pip install twine

      - name: Upload to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        run: |
          twine upload --repository testpypi dist/* || echo "TestPyPI upload skipped (no token)"

      - name: Install from TestPyPI
        if: env.TWINE_PASSWORD != ''
        run: |
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ jobscolombia
          python -c "import jobscolombia; print('Installed from TestPyPI:', jobscolombia.__version__)"
        continue-on-error: true
